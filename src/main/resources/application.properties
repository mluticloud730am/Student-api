# =============================================
#  APPLICATION CONFIGURATION
# =============================================

# Server port (default is 8080)
server.port=8080

# Application name
spring.application.name=student-api

# ── H2 In-Memory Database ──────────────────
# H2 Console: open http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:studentdb
spring.datasource.url=jdbc:h2:mem:studentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ────────────────────────
# create-drop: creates schema on startup, drops on shutdown
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true            # Print SQL to console
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# ── Logging ────────────────────────────────
logging.level.com.example.studentapi=DEBUG
